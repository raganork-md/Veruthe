<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 OrbitCapsule - Your Chill Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="space-bg"></div>

    <div class="capsule-wrapper">
        
        <div class="glass-panel sound-box">
            <h2>🎵 AMBIENT MIXER</h2>
            <p>Create your perfect focus environment</p>
            
            <div class="sound-controls">
                <div class="control-row">
                    <span>🌧️ Rain Shower</span>
                    <input type="range" id="rain-vol" min="0" max="1" step="0.1" value="0" onchange="updateVolume('rain')">
                </div>
                <div class="control-row">
                    <span>🔥 Campfire</span>
                    <input type="range" id="fire-vol" min="0" max="1" step="0.1" value="0" onchange="updateVolume('fire')">
                </div>
                <div class="control-row">
                    <span>🍃 Forest Wind</span>
                    <input type="range" id="wind-vol" min="0" max="1" step="0.1" value="0" onchange="updateVolume('wind')">
                </div>
            </div>
            <p class="audio-note">*Adjust sliders to start/mix sounds</p>
        </div>

        <div class="glass-panel center-box">
            <h1 class="logo">ORBIT_CAPSULE</h1>
            <div class="timer-display" id="timer">25:00</div>
            <div class="timer-buttons">
                <button class="action-btn" onclick="toggleTimer()">START / PAUSE</button>
                <button class="action-btn btn-reset" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div class="glass-panel diary-box">
            <h2>📝 CAPSULE THOUGHTS</h2>
            <p>Type your thoughts, they stay here.</p>
            <textarea id="diary-input" placeholder="How is your day going? Write it down..." oninput="saveNote()"></textarea>
            <span class="save-status" id="save-status">Saved locally</span>
        </div>

    </div>

    <audio id="audio-rain" loop src="https://assets.mixkit.co/active_storage/sfx/2433/2433-84.wav"></audio>
    <audio id="audio-fire" loop src="https://assets.mixkit.co/active_storage/sfx/2438/2438-84.wav"></audio>
    <audio id="audio-wind" loop src="https://assets.mixkit.co/active_storage/sfx/2432/2432-84.wav"></audio>

    <script src="script.js"></script>
</body>
</html>
