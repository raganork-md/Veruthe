<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtaVerse - Explore the Universe</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts ഫോണ്ടുകൾക്ക് വേണ്ടി -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Parallax Background Container -->
    <div class="parallax-container">
        <!-- Layer 1: ദൂരെയുള്ള ആകാശം/നക്ഷത്രങ്ങൾ -->
        <div class="parallax-layer bg-sky" data-speed="1"></div>
        <!-- Layer 2: കോട്ട/കെട്ടിടങ്ങൾ -->
        <div class="parallax-layer bg-castle" data-speed="3"></div>
        <!-- Layer 3: മുന്നിലുള്ള ക്യാരക്ടേഴ്സ് -->
        <div class="parallax-layer bg-characters" data-speed="5"></div>
    </div>

    <!-- Main Content App Interface -->
    <div class="app-interface">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">🌌 OTA_VERSE</div>
            <nav class="nav-links">
                <a href="#" class="active"><span>⚔️</span> ANIME HEROES</a>
                <a href="#"><span>🎮</span> GAME QUESTS</a>
                <a href="#"><span>📜</span> THEORY CORNER</a>
                <a href="#"><span>🎨</span> FAN ART</a>
                <a href="#"><span>📢</span> LATEST RELEASES</a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="hero-text">
                <h1>EXPLORE THE UNIVERSE:<br><span class="highlight">WHERE ANIME MEETS GAMING.</span></h1>
                <p>Your Interactive Journey Begins Here. Move Your Mouse & Discover.</p>
            </header>

            <!-- Bottom Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-guild">JOIN A GUILD</button>
                <button class="btn btn-builder">CHARACTER BUILDER</button>
                <button class="btn btn-events">UPCOMING EVENTS</button>
            </div>
        </main>

        <!-- Right Sidebar (Popular Paths) -->
        <aside class="right-sidebar">
            <h3>POPULAR PATHS:</h3>
            <div class="path-card">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=150&q=80" alt="RPG">
                <div class="card-info">
                    <h4>Top Action RPGs</h4>
                </div>
            </div>
            <div class="path-card">
                <img src="https://images.unsplash.com/photo-1579373903781-fd5c0c30c4cd?auto=format&fit=crop&w=150&q=80" alt="Anime">
                <div class="card-info">
                    <h4>Seasonal Anime Picks</h4>
                </div>
            </div>
        </aside>

    </div>

    <script src="script.js"></script>
</body>
          </html>
